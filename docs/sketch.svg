<svg xmlns="http://www.w3.org/2000/svg" width="1240" height="1481" viewBox="0 0 1240 1481">
  <rect width="1240" height="1481" fill="#f7f3e9"/>
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#27407a"/></marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#b23a2e"/></marker>
    <marker id="arrowInk" markerWidth="10" markerHeight="10" refX="5" refY="5" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 Z" fill="#2b2b33"/></marker>
  </defs>

  <!-- title -->
  <text x="78" y="100" font-family="Arial, sans-serif" font-size="58" font-weight="700" fill="#2b2b33">Equally-Spaced Hole Pattern</text>
  <text x="78" y="145" font-family="Arial, sans-serif" font-size="30" fill="#27407a">drill 4 holes evenly along the plate → find the spacing</text>
  <text x="1042" y="95" font-family="Arial, sans-serif" font-size="30" fill="#2b2b33">No. HP-04</text>
  <text x="1042" y="128" font-family="Arial, sans-serif" font-size="22" fill="#777">10 / 06 / '26</text>
  <path d="M80 177 C300 165, 820 185, 1085 174" fill="none" stroke="#2b2b33" stroke-width="3"/>

  <!-- workpiece -->
  <text x="78" y="248" font-family="Arial, sans-serif" font-size="31" fill="#27407a">the workpiece →</text>
  <path d="M145 360 L505 360 L630 285 L270 285 Z" fill="#fffdf7" stroke="#2b2b33" stroke-width="4"/>
  <path d="M145 360 L145 465 L505 465 L505 360 Z" fill="#f1eadc" stroke="#2b2b33" stroke-width="4"/>
  <path d="M505 360 L630 285 L630 392 L505 465 Z" fill="#f7f0e4" stroke="#2b2b33" stroke-width="4"/>
  <g fill="none" stroke="#27407a" stroke-width="4">
    <ellipse cx="235" cy="335" rx="19" ry="9"/>
    <ellipse cx="325" cy="335" rx="19" ry="9"/>
    <ellipse cx="415" cy="335" rx="19" ry="9"/>
    <ellipse cx="505" cy="335" rx="19" ry="9"/>
  </g>
  <text x="108" y="532" font-family="Arial, sans-serif" font-size="25" fill="#6a6760">rough block, holes go through the top face</text>

  <!-- axes -->
  <text x="742" y="248" font-family="Arial, sans-serif" font-size="31" fill="#27407a">axes</text>
  <path d="M855 365 L985 365" stroke="#27407a" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M855 365 L855 250" stroke="#27407a" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <path d="M855 365 L770 445" stroke="#27407a" stroke-width="4" marker-end="url(#arrowBlue)"/>
  <text x="999" y="377" font-family="Arial, sans-serif" font-size="29" fill="#2b2b33">x</text>
  <text x="844" y="238" font-family="Arial, sans-serif" font-size="29" fill="#2b2b33">y</text>
  <text x="750" y="466" font-family="Arial, sans-serif" font-size="29" fill="#2b2b33">z</text>

  <!-- given list -->
  <text x="742" y="505" font-family="Arial, sans-serif" font-size="31" fill="#27407a">what we know</text>
  <g font-family="Arial, sans-serif" font-size="24" fill="#2b2b33">
    <text x="742" y="555" font-size="33" font-weight="700" fill="#27407a">L</text><text x="800" y="555">total length of plate</text>
    <line x1="742" y1="576" x2="1138" y2="576" stroke="#d4cfbf" stroke-dasharray="4 5"/>
    <text x="742" y="622" font-size="33" font-weight="700" fill="#27407a">m</text><text x="800" y="622">edge margin, both ends</text>
    <line x1="742" y1="643" x2="1138" y2="643" stroke="#d4cfbf" stroke-dasharray="4 5"/>
    <text x="742" y="689" font-size="33" font-weight="700" fill="#27407a">Lu</text><text x="800" y="689">usable length between 1st and last hole</text>
    <line x1="742" y1="710" x2="1138" y2="710" stroke="#d4cfbf" stroke-dasharray="4 5"/>
    <text x="742" y="756" font-size="33" font-weight="700" fill="#27407a">s</text><text x="800" y="756">spacing between holes</text>
    <line x1="742" y1="777" x2="1138" y2="777" stroke="#d4cfbf" stroke-dasharray="4 5"/>
    <text x="742" y="823" font-size="33" font-weight="700" fill="#27407a">n</text><text x="800" y="823">number of holes = 4</text>
  </g>

  <!-- plan view -->
  <text x="78" y="610" font-family="Arial, sans-serif" font-size="31" fill="#27407a">plan view — set out the holes</text>
  <rect x="86" y="660" width="585" height="96" fill="#fffdf7" stroke="#2b2b33" stroke-width="4"/>
  <line x1="65" y1="708" x2="692" y2="708" stroke="#27407a" stroke-width="2" stroke-dasharray="16 8 4 8"/>
  <g stroke="#27407a" stroke-width="3" stroke-dasharray="9 8">
    <line x1="165" y1="625" x2="165" y2="855"/>
    <line x1="300" y1="625" x2="300" y2="855"/>
    <line x1="435" y1="625" x2="435" y2="855"/>
    <line x1="570" y1="625" x2="570" y2="855"/>
  </g>
  <g fill="#fffdf7" stroke="#27407a" stroke-width="4">
    <circle cx="165" cy="708" r="24"/><circle cx="300" cy="708" r="24"/><circle cx="435" cy="708" r="24"/><circle cx="570" cy="708" r="24"/>
  </g>
  <g font-family="Arial, sans-serif" font-size="25" fill="#2b2b33" text-anchor="middle">
    <text x="165" y="717">1</text><text x="300" y="717">2</text><text x="435" y="717">3</text><text x="570" y="717">4</text>
  </g>
  <g stroke="#999" stroke-width="1.5" stroke-dasharray="5 6">
    <line x1="86" y1="758" x2="86" y2="875"/><line x1="671" y1="758" x2="671" y2="875"/>
    <line x1="165" y1="735" x2="165" y2="842"/><line x1="300" y1="735" x2="300" y2="842"/><line x1="435" y1="735" x2="435" y2="842"/><line x1="570" y1="735" x2="570" y2="842"/>
  </g>
  <path d="M86 795 L165 795" stroke="#27407a" stroke-width="4" marker-start="url(#arrowBlue)" marker-end="url(#arrowBlue)"/>
  <path d="M570 795 L671 795" stroke="#27407a" stroke-width="4" marker-start="url(#arrowBlue)" marker-end="url(#arrowBlue)"/>
  <path d="M165 785 L300 785" stroke="#b23a2e" stroke-width="4" marker-start="url(#arrowRed)" marker-end="url(#arrowRed)"/>
  <path d="M300 785 L435 785" stroke="#b23a2e" stroke-width="4" marker-start="url(#arrowRed)" marker-end="url(#arrowRed)"/>
  <path d="M435 785 L570 785" stroke="#b23a2e" stroke-width="4" marker-start="url(#arrowRed)" marker-end="url(#arrowRed)"/>
  <path d="M165 835 L570 835" stroke="#27407a" stroke-width="4" marker-start="url(#arrowBlue)" marker-end="url(#arrowBlue)"/>
  <path d="M86 882 L671 882" stroke="#2b2b33" stroke-width="4" marker-start="url(#arrowInk)" marker-end="url(#arrowInk)"/>
  <g font-family="Arial, sans-serif" font-size="25" font-weight="700" text-anchor="middle">
    <text x="126" y="786" fill="#27407a">m</text><text x="620" y="786" fill="#27407a">m</text>
    <text x="232" y="776" fill="#b23a2e">s</text><text x="368" y="776" fill="#b23a2e">s</text><text x="503" y="776" fill="#b23a2e">s</text>
    <text x="368" y="825" fill="#27407a">Lu (usable)</text><text x="378" y="873" fill="#2b2b33">L (total length)</text>
  </g>

  <!-- formula cards -->
  <rect x="80" y="1028" width="455" height="155" rx="2" fill="#fffdf7" stroke="#b23a2e" stroke-width="4"/>
  <text x="108" y="1080" font-family="Arial, sans-serif" font-size="27" fill="#b23a2e">step 1 — usable length</text>
  <text x="108" y="1144" font-family="Arial, sans-serif" font-size="54" font-weight="700" fill="#2b2b33">Lu = L − 2m</text>
  <text x="108" y="1184" font-family="Arial, sans-serif" font-size="22" fill="#555">take off the margin at each end.</text>

  <rect x="620" y="1028" width="525" height="155" rx="2" fill="#fffdf7" stroke="#b23a2e" stroke-width="4"/>
  <text x="650" y="1080" font-family="Arial, sans-serif" font-size="27" fill="#b23a2e">step 2 — spacing</text>
  <text x="650" y="1144" font-family="Arial, sans-serif" font-size="54" font-weight="700" fill="#2b2b33">s = Lu ÷ (n−1)</text>
  <text x="650" y="1184" font-family="Arial, sans-serif" font-size="22" fill="#555">4 holes leave 3 equal gaps, so divide by 3.</text>

  <text x="80" y="1285" font-family="Arial, sans-serif" font-size="31" fill="#27407a">✦ remember: n holes → (n−1) gaps, not n !</text>
</svg>
