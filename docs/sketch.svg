<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1400" viewBox="0 0 1200 1400">
  <rect width="1200" height="1400" fill="#f8f4e8"/>
  <style>
    .title{font:700 58px system-ui, -apple-system, Segoe UI, sans-serif; fill:#23242f; letter-spacing:1px}
    .blue{font:32px system-ui, -apple-system, Segoe UI, sans-serif; fill:#173d82}
    .small{font:22px system-ui, -apple-system, Segoe UI, sans-serif; fill:#555}
    .label{font:26px system-ui, -apple-system, Segoe UI, sans-serif; fill:#173d82}
    .red{font:26px system-ui, -apple-system, Segoe UI, sans-serif; fill:#b7332a}
    .formula{font:700 64px system-ui, -apple-system, Segoe UI, sans-serif; fill:#23242f}
    .line{stroke:#252733; stroke-width:3; fill:none; stroke-linecap:round; stroke-linejoin:round}
    .thin{stroke:#173d82; stroke-width:2; fill:none; stroke-linecap:round; stroke-dasharray:8 8}
    .dim{stroke:#b7332a; stroke-width:4; fill:none; marker-start:url(#arrowR); marker-end:url(#arrowR)}
    .dimB{stroke:#173d82; stroke-width:4; fill:none; marker-start:url(#arrowB); marker-end:url(#arrowB)}
  </style>
  <defs>
    <marker id="arrowR" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 Z" fill="#b7332a"/></marker>
    <marker id="arrowB" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto-start-reverse"><path d="M0,0 L8,4 L0,8 Z" fill="#173d82"/></marker>
  </defs>

  <text x="75" y="95" class="title">Equally-Spaced Hole Pattern</text>
  <text x="75" y="140" class="blue">drill 4 holes evenly along the plate → find the spacing</text>
  <path d="M75 175 L1050 175" class="line"/>
  <text x="1015" y="95" class="small">No. HP-04</text>
  <text x="1015" y="125" class="small">10 / 06 / '26</text>

  <text x="75" y="245" class="blue">the workpiece →</text>
  <path d="M135 355 L505 355 L600 275 L270 275 Z" fill="#fbfaf4" stroke="#252733" stroke-width="4"/>
  <path d="M135 355 L135 462 L505 462 L505 355 Z" fill="#efeadf" stroke="#252733" stroke-width="4"/>
  <path d="M505 355 L600 275 L600 385 L505 462 Z" fill="#f4efe5" stroke="#252733" stroke-width="4"/>
  <ellipse cx="230" cy="330" rx="18" ry="9" fill="none" stroke="#173d82" stroke-width="4"/>
  <ellipse cx="320" cy="330" rx="18" ry="9" fill="none" stroke="#173d82" stroke-width="4"/>
  <ellipse cx="410" cy="330" rx="18" ry="9" fill="none" stroke="#173d82" stroke-width="4"/>
  <ellipse cx="500" cy="330" rx="18" ry="9" fill="none" stroke="#173d82" stroke-width="4"/>
  <text x="105" y="515" class="small">rough block, holes go through the top face</text>

  <text x="740" y="245" class="blue">axes</text>
  <path d="M850 350 L970 350" stroke="#173d82" stroke-width="4" marker-end="url(#arrowB)"/>
  <path d="M850 350 L850 250" stroke="#173d82" stroke-width="4" marker-end="url(#arrowB)"/>
  <path d="M850 350 L780 420" stroke="#173d82" stroke-width="4" marker-end="url(#arrowB)"/>
  <text x="980" y="360" class="small">x</text><text x="840" y="238" class="small">y</text><text x="760" y="440" class="small">z</text>

  <text x="740" y="505" class="blue">what we know</text>
  <text x="740" y="555" class="label">L</text><text x="795" y="555" class="small">total length of plate</text>
  <line x1="735" y1="575" x2="1115" y2="575" stroke="#ddd"/>
  <text x="740" y="620" class="label">m</text><text x="795" y="620" class="small">edge margin, both ends</text>
  <line x1="735" y1="640" x2="1115" y2="640" stroke="#ddd"/>
  <text x="740" y="685" class="label">Lu</text><text x="795" y="685" class="small">usable length between 1st and last hole</text>
  <line x1="735" y1="705" x2="1115" y2="705" stroke="#ddd"/>
  <text x="740" y="750" class="label">s</text><text x="795" y="750" class="small">spacing between holes</text>
  <line x1="735" y1="770" x2="1115" y2="770" stroke="#ddd"/>
  <text x="740" y="815" class="label">n</text><text x="795" y="815" class="small">number of holes = 4</text>

  <text x="75" y="585" class="blue">plan view — set out the holes</text>
  <rect x="85" y="650" width="560" height="90" fill="#fbfaf4" stroke="#252733" stroke-width="4"/>
  <line x1="70" y1="695" x2="660" y2="695" class="thin"/>
  <g fill="#fbfaf4" stroke="#173d82" stroke-width="4">
    <circle cx="155" cy="695" r="22"/><circle cx="288" cy="695" r="22"/><circle cx="421" cy="695" r="22"/><circle cx="554" cy="695" r="22"/>
  </g>
  <text x="147" y="704" class="small">1</text><text x="280" y="704" class="small">2</text><text x="413" y="704" class="small">3</text><text x="546" y="704" class="small">4</text>
  <line x1="155" y1="620" x2="155" y2="805" class="thin"/><line x1="288" y1="620" x2="288" y2="805" class="thin"/><line x1="421" y1="620" x2="421" y2="805" class="thin"/><line x1="554" y1="620" x2="554" y2="805" class="thin"/>
  <path d="M85 825 L645 825" class="dimB"/><text x="325" y="858" class="label">L (total length)</text>
  <path d="M155 785 L554 785" class="dimB"/><text x="320" y="780" class="label">Lu (usable)</text>
  <path d="M85 755 L155 755" class="dimB"/><text x="115" y="780" class="label">m</text>
  <path d="M554 755 L645 755" class="dimB"/><text x="595" y="780" class="label">m</text>
  <path d="M155 750 L288 750" class="dim"/><path d="M288 750 L421 750" class="dim"/><path d="M421 750 L554 750" class="dim"/>
  <text x="215" y="738" class="red">s</text><text x="348" y="738" class="red">s</text><text x="481" y="738" class="red">s</text>

  <rect x="80" y="1010" width="450" height="150" fill="#fffdf6" stroke="#b7332a" stroke-width="4"/>
  <text x="105" y="1060" class="red">step 1 — usable length</text>
  <text x="105" y="1132" class="formula">Lu = L − 2m</text>
  <text x="105" y="1178" class="small">take off the margin at each end.</text>

  <rect x="620" y="1010" width="485" height="150" fill="#fffdf6" stroke="#b7332a" stroke-width="4"/>
  <text x="650" y="1060" class="red">step 2 — spacing</text>
  <text x="650" y="1132" class="formula">s = Lu ÷ (n−1)</text>
  <text x="650" y="1178" class="small">4 holes leave 3 equal gaps, so divide by 3.</text>

  <text x="80" y="1265" class="blue">✦ remember: n holes → (n−1) gaps, not n !</text>
</svg>
